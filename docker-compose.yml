version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: backup_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: backup_root_pass
      MYSQL_DATABASE: backup_db
      MYSQL_USER: backup_user
      MYSQL_PASSWORD: backup_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: backup_server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+aiomysql://backup_user:backup_pass@mysql:3306/backup_db
      SECRET_KEY: change-to-a-random-64-char-string-in-production
      DEBUG: "false"
      CORS_ORIGINS: '["http://localhost","http://localhost:80"]'
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  nginx:
    image: nginx:alpine
    container_name: backup_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/dist:/usr/share/nginx/html:ro
    depends_on:
      - server

volumes:
  mysql_data:
  uploads_data:
