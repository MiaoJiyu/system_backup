version: "3.8"

services:
  server:
    build: ./server
    container_name: backup_server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+aiomysql://backup_user:Jiyu_42206180@192.168.1.2:3306/backup_db
      SECRET_KEY: change-to-a-random-64-char-string-in-production
      DEBUG: "false"
      CORS_ORIGINS: '["http://localhost:7004","http://192.168.1.2:7004"]'
    volumes:
      - uploads_data:/app/uploads

  nginx:
    image: nginx:alpine
    container_name: backup_nginx
    restart: unless-stopped
    ports:
      - "7004:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/dist:/usr/share/nginx/html:ro
    depends_on:
      - server

volumes:
  uploads_data:
